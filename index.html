<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Lightning Storm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #03050b;
            --bg-mid: #0e1630;
            --bg-hot: #1b1543;
            --neon-cyan: #72f1ff;
            --neon-blue: #3fa4ff;
            --neon-violet: #9ea6ff;
            --text-main: #e8eeff;
            --text-muted: #a0afcf;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at 18% 22%, #2a2355 0%, transparent 42%),
                        radial-gradient(circle at 82% 15%, #113a67 0%, transparent 38%),
                        radial-gradient(circle at 50% 100%, #0a223f 0%, transparent 35%),
                        linear-gradient(160deg, var(--bg-deep) 0%, var(--bg-mid) 55%, var(--bg-hot) 100%);
            color: var(--text-main);
            font-family: "Rajdhani", sans-serif;
        }

        .storm-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            isolation: isolate;
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        .aurora {
            position: absolute;
            inset: -20%;
            background:
                radial-gradient(circle at 20% 35%, rgba(65, 183, 255, 0.32) 0%, rgba(65, 183, 255, 0) 35%),
                radial-gradient(circle at 80% 65%, rgba(150, 114, 255, 0.28) 0%, rgba(150, 114, 255, 0) 33%),
                radial-gradient(circle at 50% 80%, rgba(85, 255, 240, 0.24) 0%, rgba(85, 255, 240, 0) 40%);
            filter: blur(54px) saturate(130%);
            mix-blend-mode: screen;
            animation: drift 12s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 1;
        }

        .hud {
            position: absolute;
            left: 50%;
            top: 6vh;
            transform: translateX(-50%);
            text-align: center;
            z-index: 3;
            pointer-events: none;
            user-select: none;
            width: min(88vw, 760px);
        }

        .hud h1 {
            margin: 0;
            font-family: "Orbitron", sans-serif;
            font-weight: 900;
            font-size: clamp(2rem, 5vw, 4rem);
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #f4f8ff;
            text-shadow: 0 0 12px rgba(175, 213, 255, 0.9),
                         0 0 30px rgba(76, 156, 255, 0.65),
                         0 0 58px rgba(124, 109, 255, 0.45);
            animation: pulse 2.8s ease-in-out infinite;
        }

        .hud p {
            margin: 0.5rem auto 0;
            font-size: clamp(0.95rem, 2vw, 1.28rem);
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            max-width: 60ch;
        }

        .flash {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 40%), rgba(170, 221, 255, 0.34) 0%, rgba(170, 221, 255, 0.07) 30%, transparent 65%);
            mix-blend-mode: screen;
            opacity: 0;
            pointer-events: none;
            z-index: 2;
            transition: opacity 160ms ease-out;
        }

        .grid {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(95, 117, 165, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(95, 117, 165, 0.1) 1px, transparent 1px);
            background-size: 36px 36px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 95%);
            animation: gridShift 15s linear infinite;
        }

        @keyframes drift {
            0% {
                transform: translate(-2%, -1%) scale(1);
            }
            100% {
                transform: translate(2%, 2%) scale(1.08);
            }
        }

        @keyframes pulse {
            0%,
            100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.2);
            }
        }

        @keyframes gridShift {
            from {
                transform: translate3d(0, 0, 0);
            }
            to {
                transform: translate3d(36px, 36px, 0);
            }
        }
    </style>
</head>
<body>
    <div class="storm-wrap">
        <div class="grid" aria-hidden="true"></div>
        <div class="aurora" aria-hidden="true"></div>
        <canvas id="storm" aria-label="Fractal lightning canvas"></canvas>
        <div class="flash" id="flash" aria-hidden="true"></div>

        <header class="hud">
            <h1>Storm Fractal</h1>
            <p>Click anywhere to summon branching lightning with recursive fractal arcs.</p>
        </header>
    </div>

    <script>
        const canvas = document.getElementById("storm");
        const flashLayer = document.getElementById("flash");
        const ctx = canvas.getContext("2d");

        const bolts = [];
        const sparks = [];
        const stars = [];

        let width = 0;
        let height = 0;
        let dpr = Math.min(window.devicePixelRatio || 1, 2);
        let flashEnergy = 0;
        let lastTime = performance.now();

        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function resize() {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            width = window.innerWidth;
            height = window.innerHeight;

            canvas.width = Math.floor(width * dpr);
            canvas.height = Math.floor(height * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            stars.length = 0;
            const starCount = Math.max(40, Math.floor((width * height) / 12000));
            for (let i = 0; i < starCount; i += 1) {
                stars.push({
                    x: random(0, width),
                    y: random(0, height),
                    r: random(0.4, 1.8),
                    twinkle: random(0.6, 1.2),
                    phase: random(0, Math.PI * 2)
                });
            }
        }

        function displaceSegment(start, end, displacement, iterations) {
            let points = [start, end];
            for (let i = 0; i < iterations; i += 1) {
                const next = [points[0]];
                for (let p = 0; p < points.length - 1; p += 1) {
                    const a = points[p];
                    const b = points[p + 1];
                    const midX = (a.x + b.x) * 0.5;
                    const midY = (a.y + b.y) * 0.5;

                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const len = Math.hypot(dx, dy) || 1;
                    const nx = -dy / len;
                    const ny = dx / len;
                    const offset = random(-displacement, displacement);

                    next.push({ x: midX + nx * offset, y: midY + ny * offset });
                    next.push(b);
                }
                points = next;
                displacement *= 0.58;
            }
            return points;
        }

        function createFractalBolt(from, to, options = {}) {
            const life = options.life ?? random(360, 620);
            const widthBase = options.widthBase ?? random(1.8, 3.4);
            const hue = options.hue ?? random(195, 230);
            const iterations = options.iterations ?? 5;
            const displacement = options.displacement ?? Math.hypot(to.x - from.x, to.y - from.y) * 0.16;

            const root = displaceSegment(from, to, displacement, iterations);
            const branches = [];

            const branchCount = options.branchCount ?? Math.floor(random(3, 7));
            for (let i = 0; i < branchCount; i += 1) {
                const anchorIndex = Math.floor(random(root.length * 0.2, root.length * 0.9));
                const anchor = root[anchorIndex];
                if (!anchor) {
                    continue;
                }

                const angle = random(-Math.PI * 0.95, Math.PI * 0.15);
                const branchLength = random(50, 180) * (1 - i / (branchCount + 2));
                const branchEnd = {
                    x: anchor.x + Math.cos(angle) * branchLength,
                    y: anchor.y + Math.sin(angle) * branchLength
                };

                branches.push({
                    points: displaceSegment(anchor, branchEnd, branchLength * 0.25, 3),
                    width: widthBase * random(0.35, 0.6)
                });
            }

            return {
                points: root,
                branches,
                born: performance.now(),
                life,
                widthBase,
                hue,
                seed: Math.random() * 1000
            };
        }

        function spawnSparks(x, y, amount = 30) {
            for (let i = 0; i < amount; i += 1) {
                const angle = random(0, Math.PI * 2);
                const speed = random(40, 340);
                sparks.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: random(260, 680),
                    age: 0,
                    size: random(1, 2.8),
                    hue: random(190, 220)
                });
            }
        }

        function linePath(points, progress = 1) {
            if (points.length < 2) {
                return;
            }

            const maxIndex = Math.floor((points.length - 1) * progress);
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i <= maxIndex; i += 1) {
                const p = points[i];
                ctx.lineTo(p.x, p.y);
            }

            const frac = (points.length - 1) * progress - maxIndex;
            if (frac > 0 && maxIndex + 1 < points.length) {
                const a = points[maxIndex];
                const b = points[maxIndex + 1];
                ctx.lineTo(a.x + (b.x - a.x) * frac, a.y + (b.y - a.y) * frac);
            }
        }

        function renderBolt(bolt, now) {
            const age = now - bolt.born;
            if (age > bolt.life) {
                return false;
            }

            const lifeT = age / bolt.life;
            const fade = 1 - lifeT;
            const reveal = Math.min(1, lifeT * 2.8 + 0.1);
            const flicker = 0.85 + Math.sin(now * 0.045 + bolt.seed) * 0.15;
            const alpha = fade * flicker;

            ctx.globalCompositeOperation = "lighter";
            ctx.shadowBlur = 26;
            ctx.shadowColor = `hsla(${bolt.hue}, 100%, 70%, ${alpha})`;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            linePath(bolt.points, reveal);
            ctx.strokeStyle = `hsla(${bolt.hue}, 100%, 76%, ${alpha * 0.95})`;
            ctx.lineWidth = bolt.widthBase * 2.1;
            ctx.stroke();

            linePath(bolt.points, reveal);
            ctx.strokeStyle = `hsla(${bolt.hue + 6}, 100%, 94%, ${Math.min(1, alpha + 0.08)})`;
            ctx.lineWidth = bolt.widthBase * 0.9;
            ctx.stroke();

            for (const branch of bolt.branches) {
                linePath(branch.points, reveal * 1.05);
                ctx.strokeStyle = `hsla(${bolt.hue + 14}, 100%, 84%, ${alpha * 0.76})`;
                ctx.lineWidth = branch.width;
                ctx.stroke();
            }

            flashEnergy = Math.max(flashEnergy, alpha * 0.95);
            return true;
        }

        function renderSparks(dt) {
            for (let i = sparks.length - 1; i >= 0; i -= 1) {
                const s = sparks[i];
                s.age += dt;
                if (s.age > s.life) {
                    sparks.splice(i, 1);
                    continue;
                }

                s.x += s.vx * (dt / 1000);
                s.y += s.vy * (dt / 1000);
                s.vx *= 0.986;
                s.vy = s.vy * 0.986 + 380 * (dt / 1000);

                const t = 1 - s.age / s.life;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size * t, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${s.hue}, 100%, 74%, ${t * 0.9})`;
                ctx.fill();
            }
        }

        function renderStars(now) {
            ctx.globalCompositeOperation = "source-over";
            for (const star of stars) {
                const twinkle = 0.45 + Math.sin(now * 0.0018 * star.twinkle + star.phase) * 0.35;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.r * twinkle, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(176, 212, 255, ${0.22 + twinkle * 0.32})`;
                ctx.fill();
            }
        }

        function animate(now) {
            const dt = Math.min(34, now - lastTime || 16);
            lastTime = now;

            ctx.clearRect(0, 0, width, height);
            renderStars(now);

            for (let i = bolts.length - 1; i >= 0; i -= 1) {
                const alive = renderBolt(bolts[i], now);
                if (!alive) {
                    bolts.splice(i, 1);
                }
            }

            renderSparks(dt);

            flashEnergy *= 0.88;
            flashLayer.style.opacity = String(Math.min(0.95, flashEnergy));

            requestAnimationFrame(animate);
        }

        function strike(x, y) {
            const start = { x: x + random(-50, 50), y: random(-50, 30) };
            const end = { x, y };
            const primary = createFractalBolt(start, end, {
                branchCount: Math.floor(random(5, 9)),
                widthBase: random(2.3, 4.1),
                life: random(440, 760),
                iterations: 6
            });
            bolts.push(primary);

            const echoCount = Math.floor(random(1, 3));
            for (let i = 0; i < echoCount; i += 1) {
                const delay = i * random(28, 64);
                setTimeout(() => {
                    bolts.push(createFractalBolt(
                        { x: start.x + random(-60, 60), y: start.y + random(-10, 40) },
                        { x: end.x + random(-80, 80), y: end.y + random(-45, 35) },
                        {
                            branchCount: Math.floor(random(3, 6)),
                            widthBase: random(1.4, 2.8),
                            life: random(260, 420),
                            iterations: 4,
                            hue: random(188, 216)
                        }
                    ));
                }, delay);
            }

            flashLayer.style.setProperty("--x", `${(x / width) * 100}%`);
            flashLayer.style.setProperty("--y", `${(y / height) * 100}%`);
            flashEnergy = Math.min(1, flashEnergy + 0.9);
            spawnSparks(x, y, Math.floor(random(26, 42)));
        }

        canvas.addEventListener("pointerdown", (event) => {
            strike(event.clientX, event.clientY);
        });

        window.addEventListener("resize", resize);
        resize();

        for (let i = 0; i < 3; i += 1) {
            setTimeout(() => {
                strike(random(width * 0.15, width * 0.85), random(height * 0.22, height * 0.88));
            }, i * 240);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
